[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"

# The Next.js plugin is strictly required for API routes to work
[[plugins]]
  package = "@netlify/plugin-nextjs"

[[redirects]]
  from = "/pages/*"
  to = "/404"
  status = 404
